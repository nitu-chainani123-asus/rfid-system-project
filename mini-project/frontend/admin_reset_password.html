<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login & Signup Form</title>

    <link rel="stylesheet" type="text/css" href="css/reset_password.css?v=1.0">

</head>



<body>

    <div class="auth-wrapper">

        <div class="background-shape"></div>

        <div class="secondary-shape"></div>

        <div class="credentials-panel signin">

            <h2 class="slide-element">Admin Reset Password</h2>

            <form id="resetForm" onsubmit="handleResetPassword(event)">

                <div class="field-wrapper slide-element">

                    <input type="password" id="newPassword" required>

                    <label for="">New Password</label>

                    <i class="fa-solid fa-lock"></i>

                </div>



                <div class="field-wrapper slide-element">

                    <input type="password" id="confirmPassword" required>

                    <label for="">Confirm Password</label>

                    <i class="fa-solid fa-lock"></i>

                </div>



                <div class="field-wrapper slide-element">

                    <button class="submit-button" type="submit">Reset Password</button>

                </div>



                <div id="message" class="slide-element" style="color: green; font-weight: 600; margin-top: 10px; display: block;"></div>

            </form>

        </div>



        <div class="welcome-section signin">

            <h2 class="slide-element">ADMIN<br>NEW PASSWORD</h2>

        </div>

    </div>



    <script>

    // Real-time password validation while typing

    document.addEventListener('DOMContentLoaded', function() {

        const newPasswordInput = document.getElementById('newPassword');

        const confirmPasswordInput = document.getElementById('confirmPassword');

        const message = document.getElementById('message');

        

        // Check passwords in real-time

        function checkPasswords() {

            const newPassword = newPasswordInput.value;

            const confirmPassword = confirmPasswordInput.value;

            

            if (newPassword === "" || confirmPassword === "") {

                message.style.display = 'none';

                return;

            }

            

            if (newPassword !== confirmPassword) {

                message.style.display = 'block';

                message.style.color = "red";

                message.innerText = "Passwords do not match.";

            } else {

                message.style.display = 'block';

                message.style.color = "green";

                message.innerText = "Passwords match.";

            }

        }

        

        // Add event listeners for real-time validation

        newPasswordInput.addEventListener('input', checkPasswords);

        confirmPasswordInput.addEventListener('input', checkPasswords);

    });



    function handleResetPassword(event) {

        event.preventDefault();

        

        console.log('🔍 handleResetPassword function called');

        

        const newPassword = document.getElementById('newPassword').value;

        const confirmPassword = document.getElementById('confirmPassword').value;

        const message = document.getElementById('message');

        

        // Get email from URL parameters - try multiple methods

        let email = null;

        let token = null;

        

        console.log('🔍 Trying to get email from URL...');

        console.log('🔍 Current URL:', window.location.href);

        console.log('🔍 URL search:', window.location.search);

        

        // Method 1: URLSearchParams

        try {

            const urlParams = new URLSearchParams(window.location.search);

            email = urlParams.get('email');

            token = urlParams.get('token');

            console.log('🔍 Method 1 - URLSearchParams:', email);

        } catch (e) {

            console.log('❌ Method 1 failed:', e);

        }

        

        // Method 2: Manual parsing

        if (!email) {

            try {

                const url = window.location.href;

                const params = url.split('?')[1];

                if (params) {

                    const paramPairs = params.split('&');

                    for (let pair of paramPairs) {

                        const [key, value] = pair.split('=');

                        if (key === 'email') {

                            email = decodeURIComponent(value);

                        }

                        if (key === 'token') {

                            token = decodeURIComponent(value);

                        }

                    }

                }

                console.log('🔍 Method 2 - Manual parsing:', email);

            } catch (e) {

                console.log('❌ Method 2 failed:', e);

            }

        }

        

        // Method 3: Hardcoded fallback for testing

        if (!email) {

            email = 'premladwani@gmail.com';  // Use actual admin email from database

            token = 'adminreset123';

            console.log('🔍 Method 3 - Hardcoded fallback:', email);

        }

        

        console.log('🔍 Final email:', email);

        console.log('🔍 Final token:', token);

        

        console.log('=== ADMIN PASSWORD RESET FRONTEND ===');

        console.log('Email from URL:', email);

        console.log('New password:', newPassword);

        console.log('Confirm password:', confirmPassword);

        console.log('Password length:', newPassword.length);

        

        if(newPassword === "" || confirmPassword === "") {

            console.log('❌ Validation failed: Empty fields');

            message.style.display = 'block';

            message.textContent = 'Please fill in all fields.';

            return;

        } else if(newPassword !== confirmPassword) {

            console.log('❌ Validation failed: Passwords do not match');

            message.style.display = 'block';

            message.style.color = "red";

            message.innerText = "Passwords do not match.";

            return;

        } else if(newPassword.length < 6) {

            console.log('❌ Validation failed: Password too short');

            message.style.display = 'block';

            message.textContent = 'Password must be at least 6 characters long.';

            return;

        }

        

        if (!email) {

            console.log('❌ Validation failed: No email found');

            message.style.color = "red";

            message.innerText = "Email not provided. Please use the reset link from your email.";

            return;

        }

        

        console.log('✅ All validations passed!');

        console.log('🚀 About to send fetch request...');

        

        // Show loading message

        message.style.display = 'block';

        message.style.color = "blue";

        message.innerText = "Resetting password...";

        

        // Call backend API to update password

        fetch('/api/admin/reset-password', {

            method: 'POST',

            headers: {

                'Content-Type': 'application/json'

            },

            body: JSON.stringify({

                email: email,

                newPassword: newPassword

            })

        })

        .then(response => {

            console.log('📡 Response received:', response.status);

            return response.json();

        })

        .then(data => {

            console.log('📥 Response data:', data);

            if (data.success) {

                if (data.message === 'New password must be different from current password.') {

                    console.log('❌ New password is same as current password');

                    message.style.color = "orange";

                    message.innerText = "New password is same as current password";

                } else {

                    console.log('✅ Admin password reset successful!');

                    message.style.color = "green";

                    message.innerText = "Admin password reset successful redirecting to login page";

                    

                    setTimeout(function(){

                    window.location.href = "adminregister.html";

                },3000);

                }

            } else {

                console.log('❌ Admin password reset failed:', data.message);

                message.style.color = "red";

                message.innerText = data.message || "Failed to reset password. Please try again.";

            }

        })

        .catch(error => {

            console.error('❌ Fetch error:', error);

            message.style.color = "red";

            message.innerText = "Network error. Please try again later.";

        });

    }



    </script>

    

</body>



</html>
