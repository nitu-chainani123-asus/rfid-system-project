<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup Form</title>
    <link rel="stylesheet" type="text/css" href="css/reset_password.css?v=2.0">
</head>

<body>
    <div class="auth-wrapper">
        <div class="background-shape"></div>
        <div class="secondary-shape"></div>
        <div class="credentials-panel signin">
            <h2 class="slide-element">Reset Password</h2>
            <form id="resetForm" action="#" onsubmit="handleResetPassword(event)">
                <div class="field-wrapper slide-element">
                    <input type="password" id="newPassword" required>
                    <label for="">New Password</label>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <input type="password" id="confirmPassword" required>
                    <label for="">Confirm Password</label>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="field-wrapper slide-element">
                    <button class="submit-button" type="submit">Reset Password</button>
                </div>

                <div id="message" class="slide-element" style="color: green; font-weight: 600; margin-top: 10px; display: none;"></div>
            </form>
        </div>

        <div class="welcome-section signin">
            <h2 class="slide-element">NEW<br>PASSWORD</h2>
        </div>
    </div>

    <script>
    // Real-time password validation while typing
    document.addEventListener('DOMContentLoaded', function() {
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const message = document.getElementById('message');
        
        // Check passwords in real-time
        function checkPasswords() {
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            if (newPassword === "" || confirmPassword === "") {
                message.style.display = 'none';
                return;
            }
            
            if (newPassword !== confirmPassword) {
                message.style.display = 'block';
                message.style.color = "red";
                message.innerText = "Passwords do not match.";
            } else {
                message.style.display = 'block';
                message.style.color = "green";
                message.innerText = "Passwords match.";
            }
        }
        
        // Add event listeners for real-time validation
        newPasswordInput.addEventListener('input', checkPasswords);
        confirmPasswordInput.addEventListener('input', checkPasswords);
    });
    
    function handleResetPassword(event) {
        console.log('🚀 Reset password function called!');
        event.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const message = document.getElementById('message');
        
        if(newPassword === "" || confirmPassword === "") {
            message.style.display = 'block';
            message.textContent = 'Please fill in all fields.';
            return;
        } else if(newPassword !== confirmPassword) {
            message.style.display = 'block';
            message.textContent = 'Passwords do not match.';
            return;
        } else if(newPassword.length < 6) {
            message.style.display = 'block';
            message.textContent = 'Password must be at least 6 characters long.';
            return;
        } else {
            message.style.display = 'block';
            // Call API to reset password
            console.log('🚀 Calling API to reset password!');
            
            // Get email from URL parameters (exactly like admin version)
            let email = null;
            let token = null;
            
            // Method 1: URLSearchParams
            try {
                const urlParams = new URLSearchParams(window.location.search);
                email = urlParams.get('email');
                token = urlParams.get('token');
                console.log('� Method 1 - URLSearchParams:', email);
            } catch (e) {
                console.log('❌ Method 1 failed:', e);
            }
            
            // Method 2: Manual parsing (like admin version)
            if (!email) {
                try {
                    const url = window.location.href;
                    const params = url.split('?')[1];
                    if (params) {
                        const paramPairs = params.split('&');
                        for (let pair of paramPairs) {
                            const [key, value] = pair.split('=');
                            if (key === 'email') {
                                email = decodeURIComponent(value);
                            } else if (key === 'token') {
                                token = decodeURIComponent(value);
                            }
                        }
                    }
                    console.log('� Method 2 - Manual parsing:', email);
                } catch (e) {
                    console.log('❌ Method 2 failed:', e);
                }
            }
            
            // Method 3: Fallback (like admin version)
            if (!email) {
                console.log('🔍 Method 3 - Using fallback');
                // Try to get from localStorage or use a test email
                email = localStorage.getItem('resetEmail') || 'premladwani@gmail.com';
            }
            
            console.log('📧 Final email being used:', email);
            
            // If still no email, show error
            if (!email) {
                message.style.display = 'block';
                message.style.color = 'red';
                message.innerText = 'Email not provided. Please use the reset link from your email.';
                return;
            }
            
            message.style.color = 'blue';
            message.innerText = 'Resetting password...';
            
            // Call backend API to update password (exactly like admin version)
            fetch('/api/user/reset-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    newPassword: newPassword
                })
            })
            .then(response => {
                console.log('📡 Response received!');
                console.log('📡 Response status:', response.status);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('📥 Response data received!');
                console.log('📥 Response data:', data);
                if (data.success) {
                    message.style.color = 'green';
                    message.innerText = data.message;
                    console.log('✅ Password reset successful!');
                    setTimeout(() => {
                        window.location.href = 'userregister.html';
                    }, 2000);
                } else {
                    message.style.color = 'red';
                    message.innerText = data.message || 'Failed to reset password.';
                    console.log('❌ Password reset failed:', data.message);
                }
            })
            .catch(error => {
                console.error('❌ Network error:', error);
                message.style.color = 'red';
                message.innerText = 'Failed to reset password. Please try again.';
            });
        }
    }
    </script>
    <script src="js/reset_password.js"></script>
</body>

</html>
