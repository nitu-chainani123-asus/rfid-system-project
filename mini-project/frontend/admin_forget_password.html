<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login & Signup Form</title>

    <link rel="stylesheet" type="text/css" href="css/forget_password.css?v=1.0">

</head>



<body>

    <div class="auth-wrapper">

        <div class="background-shape"></div>

        <div class="secondary-shape"></div>

        <div class="credentials-panel signin">

            <h2 class="slide-element">Admin Forgot Password</h2>

            <form id="forgotForm" onsubmit="handleForgotPassword(event)">

                <div class="field-wrapper slide-element">

                    <input type="email" id="email" required>

                    <label for="">Email Address</label>

                    <i class="fa-solid fa-envelope"></i>

                </div>



                <div class="field-wrapper slide-element">

                    <button class="submit-button" type="submit">Send Reset Link</button>

                </div>



                <div id="message" class="slide-element" style="color: green; font-weight: 600; margin-top: 10px; display: none;"></div>

            </form>

        </div>



        <div class="welcome-section signin">

            <h2 class="slide-element">ADMIN<br>FORGOT PASSWORD</h2>

        </div>

    </div>



    <script>

    function handleForgotPassword(event) {

        event.preventDefault();

        

        console.log('🔍 handleForgotPassword function called');

        

        const email = document.getElementById('email').value;

        const message = document.getElementById('message');

        

        console.log('Email:', email);

        

        if (!email) {

            console.log('❌ Email is required');

            message.style.display = 'block';

            message.style.color = 'red';

            message.textContent = 'Email is required.';

            return;

        }

        

        // Show loading message

        console.log('Sending password reset request...');

        message.style.display = 'block';

        message.style.color = 'blue';

        message.textContent = 'Sending reset link...';

        

        // Call backend API to send reset link

        fetch('/api/admin/forgot-password', {

            method: 'POST',

            headers: {

                'Content-Type': 'application/json'

            },

            body: JSON.stringify({

                email: email

            })

        })

        .then(response => {

            console.log('Response status:', response.status);

            return response.json();

        })

        .then(data => {

            console.log('Response data:', data);
            
            if (data.success) {

                console.log('✅ Password reset link sent successfully!');

                message.style.color = 'green';

                message.textContent = 'Password reset link sent! Redirecting...';
                
                // Redirect to admin reset password page after 2 seconds

                setTimeout(() => {

                    window.location.href = `admin_reset_password.html?email=${encodeURIComponent(email)}&token=${data.resetLink ? data.resetLink.split('?token=')[1] : ''}`;

                }, 2000);

            } else {

                console.log('❌ Failed to send reset link');

                message.style.color = 'red';

                message.textContent = data.message || 'Failed to send reset link. Please try again.';

            }

        })

        .catch(error => {

            console.error('Password reset error:', error);

            message.style.color = 'red';

            message.textContent = 'Network error. Please try again later.';

        });

    }

    </script>

    

</body>



</html>
